<!-- Popup Form -->
<div class="popup-overlay" id="popupForm">
  <div class="popup-form">
    <button class="popup-form__close" onclick="closePopup()">&times;</button>
    <h3>Обратный звонок</h3>
    <p>Оставьте номер телефона, и мы перезвоним вам в течение 15 минут</p>
    <form action="https://formspree.io/f/movgnzzk" method="POST">
      <div class="form-group">
        <label for="popup-name">Имя *</label>
        <input type="text" id="popup-name" name="name" required>
      </div>
      <div class="form-group">
        <label for="popup-phone">Телефон *</label>
        <input type="tel" id="popup-phone" name="phone" required>
      </div>
      <div class="form-group">
        <label for="popup-question">Ваш вопрос</label>
        <textarea id="popup-question" name="question" rows="3"></textarea>
      </div>
      <div class="form-checkbox">
        <input type="checkbox" id="popup-consent" name="consent" required checked>
        <label for="popup-consent">Даю согласие на обработку персональных данных</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Отправить</button>
    </form>
  </div>
</div>

<!-- Popup Trigger Button -->
<button class="popup-trigger" onclick="openPopup()">Заказать звонок</button>

<script>
function openPopup() {
  document.getElementById('popupForm').classList.add('active');
}

function closePopup() {
  document.getElementById('popupForm').classList.remove('active');
}

document.getElementById('popupForm').addEventListener('click', function(e) {
  if (e.target === this) {
    closePopup();
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closePopup();
  }
});
</script>
